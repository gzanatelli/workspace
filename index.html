const STORAGE_KEY = 'meu_workspace_data';
const RECORD_ID = 1;

async function supabaseGet() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/workspace?id=eq.${RECORD_ID}&select=data`, {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
    });
    const rows = await r.json();
    if (rows && rows.length > 0 && rows[0].data) return JSON.parse(rows[0].data);
    return null;
  } catch(e) { return null; }
}

async function supabaseSave(data) {
  try {
    const json = JSON.stringify(data);
    localStorage.setItem(STORAGE_KEY, json);
    await fetch(`${SUPABASE_URL}/rest/v1/workspace`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({id: RECORD_ID, data: json})
    });
  } catch(e) {}
}

const fdb = {
  ref: function(path) {
    return {
      on: function(event, callback) {
        const local = localStorage.getItem(STORAGE_KEY);
        if (local) {
          try { callback({ val: () => JSON.parse(local) }); } catch(e) {}
        }
        supabaseGet().then(data => {
          if (data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            callback({ val: () => data });
          } else if (!local) {
            callback({ val: () => null });
          }
        });
      },
      off: function() {},
      set: function(data) { supabaseSave(data); }
    };
  }
};

// ── Pomodoro ──────────────────────────────────────
function Pomodoro({onClose}){
  const M={foco:25*60,curta:5*60,longa:15*60};
  const [mode,setMode]=useState('foco');const [time,setTime]=useState(M.foco);const [run,setRun]=useState(false);const [sess,setSess]=useState(0);const ref=useRef(null);
  useEffect(()=>{if(run){ref.current=setInterval(()=>setTime(t=>{if(t<=1){setRun(false);if(mode==='foco')setSess(x=>x+1);return M[mode];}return t-1;}),1000);}return()=>clearInterval(ref.current);},[run,mode]);
  const sw=m=>{setMode(m);setTime(M[m]);setRun(false);};
  const mm=String(Math.floor(time/60)).padStart(2,'0'),ss=String(time%60).padStart(2,'0');
  return html`
    <div style=${{position:'fixed',bottom:20,right:20,zIndex:500,background:'#1e1e2e',borderRadius:16,padding:'1.25rem',width:240,boxShadow:'0 8px 32px rgba(0,0,0,0.35)',color:'#cdd6f4'}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
        <span style=${{fontWeight:700,fontSize:13}}>⏱️ Pomodoro <span style=${{color:'#abb2bf',fontWeight:400}}>🍅${sess}</span></span>
        <button onClick=${onClose} style=${{...sb,background:'transparent',color:'#abb2bf',padding:'0 5px',fontSize:13}}>✕</button>
      </div>
      <div style=${{display:'flex',gap:3,marginBottom:'0.75rem'}}>
        ${[['foco','Foco'],['curta','Curta'],['longa','Longa']].map(([k,v])=>html`<button key=${k} onClick=${()=>sw(k)} style=${{...sb,flex:1,background:mode===k?'#6366f1':'#2a2a3e',color:mode===k?'#fff':'#abb2bf',fontSize:10,padding:'0.25rem 0',fontWeight:400,borderRadius:6}}>${v}</button>`)}
      </div>
      <div style=${{height:3,background:'#2a2a3e',borderRadius:99,marginBottom:'0.75rem'}}><div style=${{height:'100%',width:((1-time/M[mode])*100)+'%',background:'#6366f1',borderRadius:99,transition:'width 1s linear'}}/></div>
      <div style=${{textAlign:'center',fontSize:44,fontWeight:700,fontFamily:'monospace',color:'#fff',marginBottom:'0.75rem',letterSpacing:3}}>${mm}:${ss}</div>
      <div style=${{display:'flex',gap:6}}>
        <button onClick=${()=>setRun(r=>!r)} style=${{...sb,flex:1,background:'#6366f1',color:'#fff'}}>${run?'⏸ Pausar':'▶ Iniciar'}</button>
        <button onClick=${()=>{setTime(M[mode]);setRun(false);}} style=${{...sb,background:'#2a2a3e',color:'#abb2bf',padding:'0.5rem 0.65rem'}}>↺</button>
      </div>
    </div>`;
}

const TMPLS={'Ata de Reunião':()=>[{id:uid(),type:'h1',content:'Ata de Reunião'},{id:uid(),type:'paragraph',content:'📅 Data:\n👥 Participantes:'},{id:uid(),type:'h2',content:'Pauta'},{id:uid(),type:'checklist',items:[{id:uid(),text:'Tópico 1',done:false}]},{id:uid(),type:'h2',content:'Decisões'},{id:uid(),type:'paragraph',content:''},{id:uid(),type:'h2',content:'Próximas ações'},{id:uid(),type:'checklist',items:[{id:uid(),text:'Ação 1',done:false}]}],'Plano de Projeto':()=>[{id:uid(),type:'h1',content:'Plano de Projeto'},{id:uid(),type:'h2',content:'Objetivo'},{id:uid(),type:'paragraph',content:''},{id:uid(),type:'h2',content:'Escopo'},{id:uid(),type:'checklist',items:[{id:uid(),text:'Entregável 1',done:false}]},{id:uid(),type:'h2',content:'Cronograma'},{id:uid(),type:'table',headers:['Etapa','Prazo','Status'],rows:[['','',''],['','','']]},{id:uid(),type:'h2',content:'Riscos'},{id:uid(),type:'paragraph',content:''}],'Brainstorm':()=>[{id:uid(),type:'h1',content:'Brainstorm'},{id:uid(),type:'h2',content:'Problema'},{id:uid(),type:'paragraph',content:''},{id:uid(),type:'h2',content:'Ideias'},{id:uid(),type:'checklist',items:[{id:uid(),text:'',done:false},{id:uid(),text:'',done:false}]},{id:uid(),type:'h2',content:'Próximos passos'},{id:uid(),type:'checklist',items:[{id:uid(),text:'',done:false}]}]};
function newBlock(type){const b={id:uid(),type};if(type==='table')return{...b,headers:['Col 1','Col 2'],rows:[['',''],['','']]};if(type==='code')return{...b,content:'',lang:'javascript'};if(type==='tableref')return{...b,tabelaId:''};if(type==='checklist')return{...b,items:[{id:uid(),text:'',done:false}]};return{...b,content:''};}

function CodeBlock({block,onUpdate}){
  const [cp,setCp]=useState(false);
  const copy=()=>{try{if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(block.content||'');else{const t=document.createElement('textarea');t.value=block.content||'';t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}setCp(true);setTimeout(()=>setCp(false),1500);}catch(e){}};
  return html`
    <div style=${{background:'#1e1e2e',borderRadius:10,overflow:'hidden',margin:'4px 0'}}>
      <div style=${{display:'flex',justifyContent:'space-between',padding:'5px 12px',background:'#16213e',alignItems:'center'}}>
        <select value=${block.lang||'javascript'} onChange=${e=>onUpdate({lang:e.target.value})} style=${{background:'transparent',border:'none',color:'#7ec8e3',fontSize:11,cursor:'pointer',outline:'none'}}>
          ${LANGS.map(l=>html`<option key=${l} value=${l}>${l}</option>`)}
        </select>
        <button onClick=${copy} style=${{...sb,background:cp?'#10b981':'transparent',color:cp?'#fff':'#abb2bf',fontSize:11,padding:'2px 8px'}}>${cp?'✓ copiado':'copiar'}</button>
      </div>
      <textarea value=${block.content||''} onChange=${e=>onUpdate({content:e.target.value})} placeholder="// código..."
        style=${{width:'100%',minHeight:110,background:'#1e1e2e',color:'#abb2bf',border:'none',outline:'none',padding:'10px 14px',fontFamily:"'Courier New',monospace",fontSize:13,resize:'vertical',boxSizing:'border-box',lineHeight:1.7}}/>
    </div>`;
}

function ChecklistBlock({block,onUpdate}){
  const items=block.items||[];
  const upd=(id,u)=>onUpdate({items:items.map(i=>i.id===id?{...i,...u}:i)});
  return html`
    <div style=${{margin:'4px 0'}}>
      ${items.map(item=>html`
        <div key=${item.id} style=${{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
          <input type="checkbox" checked=${item.done} onChange=${e=>upd(item.id,{done:e.target.checked})} style=${{width:15,height:15,accentColor:C.primary,cursor:'pointer',flexShrink:0}}/>
          <input style=${{border:'none',outline:'none',flex:1,fontSize:13,fontFamily:'inherit',textDecoration:item.done?'line-through':'none',color:item.done?C.muted:C.text,background:'transparent'}}
            value=${item.text} onChange=${e=>upd(item.id,{text:e.target.value})} placeholder="Item..."/>
          <button onClick=${()=>onUpdate({items:items.filter(i=>i.id!==item.id)})} style=${{...sb,background:'transparent',color:C.muted,padding:'0 3px',fontSize:11,opacity:0.4}}>✕</button>
        </div>`)}
      <button onClick=${()=>onUpdate({items:[...items,{id:uid(),text:'',done:false}]})} style=${{...sb,background:'transparent',color:C.primary,fontSize:12,padding:'2px 0',fontWeight:500}}>+ item</button>
    </div>`;
}

function TGrid({headers,rows,onUH,onUC,onAR,onAC,onDR,onDC}){

    <div style=${{overflowX:'auto'}}>
      <table style=${{borderCollapse:'collapse',width:'100%'}}>
        <thead><tr style=${{background:'var(--cb)'}}>
          ${headers.map((h,i)=>html`<th key=${i} style=${{...cs,fontWeight:600,minWidth:80}}>
            <div style=${{display:'flex',alignItems:'center',gap:3}}>
              <input style=${ci} value=${h} onChange=${e=>onUH(i,e.target.value)}/>
              ${headers.length>1&&html`<button onClick=${()=>onDC(i)} style=${{...sb,background:'transparent',color:C.alta,padding:'0 2px',fontSize:10,opacity:0.5}}>✕</button>`}
            </div></th>`)}
          <th style=${{...cs,width:32}}><button onClick=${onAC} style=${{...sb,background:'transparent',color:C.primary,fontSize:16,padding:0}}>+</button></th>
        </tr></thead>
        <tbody>
          ${rows.map((row,ri)=>html`<tr key=${ri}>
            ${row.map((cell,ci2)=>html`<td key=${ci2} style=${cs}><input style=${ci} value=${cell} onChange=${e=>onUC(ri,ci2,e.target.value)}/></td>`)}
            <td style=${{...cs,width:32,textAlign:'center'}}><button onClick=${()=>onDR(ri)} style=${{...sb,background:'transparent',color:C.alta,padding:0,fontSize:11,opacity:0.4}}>🗑</button></td>
          </tr>`)}
          <tr><td colSpan=${headers.length+1} style=${{...cs,textAlign:'center'}}>
            <button onClick=${onAR} style=${{...sb,background:'transparent',color:C.primary,fontSize:12,padding:'3px 10px',fontWeight:400}}>+ linha</button>

              <tbody>${rt.rows.map((row,ri)=>html`<tr key=${ri}>${row.map((cell,ci)=>html`<td key=${ci} style=${{border:'1px solid var(--cbr)',padding:'4px 8px',color:C.text}}>${cell}</td>`)}</tr>`)}</tbody>

}

function BlockEditor({blocks=[],onChange,tabelas=[]}){
  const add=(type,idx)=>{const b=newBlock(type);const a=[...blocks];a.splice(idx===undefined?a.length:idx+1,0,b);onChange(a);};
  const upd=(idx,u)=>onChange(blocks.map((b,i)=>i===idx?{...b,...u}:b));
  const del=idx=>onChange(blocks.filter((_,i)=>i!==idx));
  return html`
    <div>
      ${blocks.length===0&&html`<p style=${{color:C.muted,fontSize:13}}>Passe o mouse e clique <strong>+</strong> para adicionar blocos.</p>`}
      ${blocks.map((block,idx)=>html`<${BlockItem} key=${block.id} block=${block} onUpdate=${u=>upd(idx,u)} onDelete=${()=>del(idx)} onAdd=${type=>add(type,idx)} tabelas=${tabelas}/>`)}
      <div style=${{marginTop:12,display:'flex',gap:5,flexWrap:'wrap',borderTop:'1px dashed var(--cbr)',paddingTop:10}}>
        ${BMENU.map(m=>html`<button key=${m.type} onClick=${()=>add(m.type)} style=${{...sb,background:'var(--cb)',color:C.text,padding:'0.2rem 0.55rem',fontSize:11,border:'1px solid var(--cbr)',fontWeight:400}}>
          <span style=${{fontFamily:'monospace',color:C.primary,marginRight:3,fontSize:10,fontWeight:700}}>${m.icon}</span>${m.label}
        </button>`)}
      </div>
    </div>`;
}

// ── Etapas ────────────────────────────────────────
function Etapas({etapas=[],onChange}){
  const SE={pendente:C.muted,'em andamento':C.doing,'concluída':C.done};
  const aE=()=>onChange([...etapas,{id:uid(),titulo:'Nova etapa',status:'pendente',subtopicos:[]}]);
  const uE=(id,u)=>onChange(etapas.map(e=>e.id===id?{...e,...u}:e));
  const dE=id=>onChange(etapas.filter(e=>e.id!==id));
  const aS=eid=>onChange(etapas.map(e=>e.id===eid?{...e,subtopicos:[...e.subtopicos,{id:uid(),titulo:'',concluido:false}]}:e));
  const uS=(eid,sid,u)=>onChange(etapas.map(e=>e.id===eid?{...e,subtopicos:e.subtopicos.map(x=>x.id===sid?{...x,...u}:x)}:e));
  const dS=(eid,sid)=>onChange(etapas.map(e=>e.id===eid?{...e,subtopicos:e.subtopicos.filter(x=>x.id!==sid)}:e));
  return html`
    <div>
      ${etapas.map((e,ei)=>{
        const ds=e.subtopicos.filter(x=>x.concluido).length,pr=e.subtopicos.length?Math.round(ds/e.subtopicos.length*100):0;

            <input style=${{...si,flex:1,fontWeight:600,fontSize:13}} value=${e.titulo} onChange=${ev=>uE(e.id,{titulo:ev.target.value})} placeholder="Etapa"/>
            <select style=${{...si,width:'auto',fontSize:11,padding:'3px 7px'}} value=${e.status} onChange=${ev=>uE(e.id,{status:ev.target.value})}>
              <option value="pendente">Pendente</option><option value="em andamento">Em andamento</option><option value="concluída">Concluída</option>
            </select>
            <button onClick=${()=>dE(e.id)} style=${{...sb,background:'transparent',color:C.alta,padding:'0.15rem 0.4rem',fontSize:11}}>🗑</button>
          </div>
          ${e.subtopicos.length>0&&html`<div style=${{marginLeft:22,marginBottom:5}}>
            <div style=${{height:3,background:'var(--cbr)',borderRadius:99,marginBottom:6}}><div style=${{height:'100%',width:pr+'%',background:SE[e.status]||C.primary,borderRadius:99}}/></div>
            ${e.subtopicos.map(sub=>html`<div key=${sub.id} style=${{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
              <input type="checkbox" checked=${sub.concluido} onChange=${ev=>uS(e.id,sub.id,{concluido:ev.target.checked})} style=${{width:14,height:14,accentColor:C.primary,cursor:'pointer',flexShrink:0}}/>
              <input style=${{border:'none',outline:'none',flex:1,fontSize:12,fontFamily:'inherit',background:'transparent',textDecoration:sub.concluido?'line-through':'none',color:sub.concluido?C.muted:C.text}}
                value=${sub.titulo} onChange=${ev=>uS(e.id,sub.id,{titulo:ev.target.value})} placeholder="Subtópico..."/>
              <button onClick=${()=>dS(e.id,sub.id)} style=${{...sb,background:'transparent',color:C.muted,padding:'0 3px',fontSize:10,opacity:0.4}}>✕</button>
            </div>`)}
          </div>`}
          <button onClick=${()=>aS(e.id)} style=${{...sb,background:'transparent',color:C.primary,fontSize:11,padding:'1px 0 1px 22px',fontWeight:400}}>+ subtópico</button>
        </div>`;
      })}
      <button onClick=${aE} style=${{...sb,background:C.primary+'12',color:C.primary,border:'1px dashed '+C.primary,fontSize:12,padding:'0.35rem 0.85rem',width:'100%'}}>+ Nova etapa</button>
    </div>`;
}

// ── Calendário ────────────────────────────────────
function Calendario({tarefas,reunioes}){
  const [m,setM]=useState(new Date());const [sel,setSel]=useState(null);
  const y=m.getFullYear(),mo=m.getMonth();
  const fd=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate();
  const days=[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const gI=d=>{if(!d)return[];const dt=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');return[...tarefas.filter(t=>t.prazo===dt&&t.status!=='concluída').map(t=>({...t,_t:'t'})),...reunioes.filter(r=>r.data===dt).map(r=>({...r,_t:'r'}))];};
  const isT=d=>{const n=new Date();return d&&n.getDate()===d&&n.getMonth()===mo&&n.getFullYear()===y;};
  const DN=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return html`
    <div>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <h1 style=${{fontSize:22,fontWeight:700,margin:0,color:C.text}}>🗓️ Calendário</h1>
        <div style=${{display:'flex',alignItems:'center',gap:12}}>
          <button onClick=${()=>setM(new Date(y,mo-1,1))} style=${{...sb,background:'var(--cb)',border:'1px solid var(--cbr)',color:C.text,padding:'0.35rem 0.75rem',fontWeight:400}}>◀</button>
          <span style=${{fontWeight:600,fontSize:15,color:C.text,minWidth:150,textAlign:'center'}}>${MN[mo]} ${y}</span>
          <button onClick=${()=>setM(new Date(y,mo+1,1))} style=${{...sb,background:'var(--cb)',border:'1px solid var(--cbr)',color:C.text,padding:'0.35rem 0.75rem',fontWeight:400}}>▶</button>
        </div>
      </div>
      <div style=${{background:'var(--cc)',borderRadius:12,border:'1px solid var(--cbr)',overflow:'hidden'}}>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid var(--cbr)'}}>
          ${DN.map(d=>html`<div key=${d} style=${{textAlign:'center',fontSize:11,fontWeight:600,color:C.muted,padding:'0.6rem',textTransform:'uppercase',letterSpacing:'0.05em'}}>${d}</div>`)}
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
          ${days.map((day,i)=>{const items=gI(day),td=isT(day);return html`
            <div key=${i} onClick=${()=>day&&setSel(sel===day?null:day)} style=${{minHeight:80,padding:'0.5rem',cursor:day?'pointer':'default',borderRight:i%7!==6?'1px solid var(--cbr)':'none',borderBottom:i<days.length-7?'1px solid var(--cbr)':'none',background:td?C.primary+'08':sel===day?'var(--cb)':'transparent'}}>
              ${day&&html`<div style=${{fontWeight:td?700:400,width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%',background:td?C.primary:'transparent',color:td?'#fff':C.text,fontSize:13,marginBottom:3}}>${day}</div>`}
              ${items.slice(0,2).map((item,j)=>html`<div key=${j} style=${{fontSize:10,padding:'1px 5px',borderRadius:4,marginBottom:2,background:item._t==='t'?C.primary+'20':C.doing+'20',color:item._t==='t'?C.primary:C.doing,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${item.titulo}</div>`)}
              ${items.length>2&&html`<div style=${{fontSize:10,color:C.muted}}>+${items.length-2}</div>`}
            </div>`;
          })}
        </div>
      </div>
      ${sel&&gI(sel).length>0&&html`
        <div style=${{...sc,marginTop:'0.75rem'}}>
          <div style=${{fontWeight:600,fontSize:13,marginBottom:'0.75rem',color:C.text}}>${String(sel).padStart(2,'0')}/${String(mo+1).padStart(2,'0')}/${y}</div>
          ${gI(sel).map((item,i)=>html`<div key=${i} style=${{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid var(--cbr)'}}>
            <span style=${{fontSize:14}}>${item._t==='t'?'✅':'📅'}</span>
            <div>
              <div style=${{fontSize:13,fontWeight:500,color:C.text}}>${item.titulo}</div>
              ${item._t==='t'&&html`<${Badge} label=${item.prioridade} color=${PCOL[item.prioridade]} sm=${true}/>`}
            </div>
          </div>`)}
        </div>`}
    </div>`;
}

// ── Relatórios ────────────────────────────────────
function Relatorios({tarefas,projetos,log}){
  const tot=tarefas.length||1;
  const byS={done:tarefas.filter(t=>t.status==='concluída').length,doing:tarefas.filter(t=>t.status==='em andamento').length,todo:tarefas.filter(t=>t.status==='a fazer').length};
  const byP={alta:tarefas.filter(t=>t.prioridade==='alta').length,media:tarefas.filter(t=>t.prioridade==='média').length,baixa:tarefas.filter(t=>t.prioridade==='baixa').length};
  const weeks=Array.from({length:8},(_,i)=>{const wS=new Date();wS.setDate(wS.getDate()-(7*(7-i)));const wE=new Date(wS);wE.setDate(wE.getDate()+6);const cr=tarefas.filter(t=>t.criadaEm&&new Date(t.criadaEm)>=wS&&new Date(t.criadaEm)<=wE).length,dn=tarefas.filter(t=>t.criadaEm&&new Date(t.criadaEm)>=wS&&new Date(t.criadaEm)<=wE&&t.status==='concluída').length;return{label:'S'+(i+1),cr,dn};});
  const maxW=Math.max(...weeks.map(w=>w.cr),1);
  const ACOR={criou:C.primary,editou:C.media,concluiu:C.done,deletou:C.alta};
  const Bar=({val,max,color,label})=>html`
    <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
      <span style=${{fontSize:12,color:C.muted,width:70,textAlign:'right'}}>${label}</span>
      <div style=${{flex:1,height:8,background:'var(--cb)',borderRadius:99}}><div style=${{height:'100%',width:(val/max*100)+'%',background:color,borderRadius:99}}/></div>
      <span style=${{fontSize:12,fontWeight:600,color:C.text,width:24}}>${val}</span>
    </div>`;
  return html`
    <div>
      <h1 style=${{fontSize:22,fontWeight:700,margin:'0 0 1.5rem',color:C.text}}>📈 Relatórios</h1>
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',marginBottom:'0.75rem'}}>
        <div style=${sc}>
          <div style=${{fontWeight:600,fontSize:13,marginBottom:'0.85rem',color:C.text}}>Por status</div>
          <${Bar} val=${byS.done} max=${tot} color=${C.done} label="Concluídas"/>
          <${Bar} val=${byS.doing} max=${tot} color=${C.doing} label="Andamento"/>
          <${Bar} val=${byS.todo} max=${tot} color=${C.todo} label="A fazer"/>
          <div style=${{marginTop:10,fontSize:12,color:C.muted,textAlign:'center'}}>${tot} tarefas total</div>
        </div>
        <div style=${sc}>
          <div style=${{fontWeight:600,fontSize:13,marginBottom:'0.85rem',color:C.text}}>Por prioridade</div>
          <${Bar} val=${byP.alta} max=${tot} color=${C.alta} label="Alta"/>
          <${Bar} val=${byP.media} max=${tot} color=${C.media} label="Média"/>
          <${Bar} val=${byP.baixa} max=${tot} color=${C.baixa} label="Baixa"/>
        </div>
      </div>
      <div style=${sc}>
        <div style=${{fontWeight:600,fontSize:13,marginBottom:'0.85rem',color:C.text}}>Tarefas por semana</div>
        <div style=${{display:'flex',alignItems:'flex-end',gap:8,height:80}}>
          ${weeks.map((w,i)=>html`
            <div key=${i} style=${{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              <div style=${{width:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end',height:60,gap:2}}>
                <div style=${{width:'100%',background:C.done,borderRadius:'3px 3px 0 0',height:(w.dn/maxW*55)+'px',minHeight:w.dn>0?3:0}}/>
                <div style=${{width:'100%',background:C.primary+'60',height:((w.cr-w.dn)/maxW*55)+'px',minHeight:(w.cr-w.dn)>0?3:0}}/>
              </div>
              <span style=${{fontSize:10,color:C.muted}}>${w.label}</span>
            </div>`)}
        </div>
      </div>
      <div style=${sc}>
        <div style=${{fontWeight:600,fontSize:13,marginBottom:'0.75rem',color:C.text}}>📝 Atividade recente</div>
        ${(log||[]).length===0&&html`<p style=${{fontSize:12,color:C.muted}}>Nenhuma atividade registrada.</p>`}
        ${(log||[]).slice(0,10).map(e=>html`
          <div key=${e.id} style=${{fontSize:12,color:C.muted,marginBottom:5,display:'flex',gap:6}}}>
            <span style=${{color:ACOR[e.acao]||C.primary,fontSize:10,marginTop:2}}>●</span>
            <span><strong style=${{color:C.text}}>${e.acao}</strong> ${e.tipo} · ${(e.titulo||'').slice(0,30)}</span>
          </div>`)}
      </div>
    </div>`;
}

// ── Tags ──────────────────────────────────────────
function Tags({data}){
  const [sel,setSel]=useState(null);
  const allItems=[...data.tarefas.map(t=>({...t,_tipo:'Tarefa',_emoji:'✅'})),...data.projetos.map(p=>({...p,_tipo:'Projeto',_emoji:'🗂️'})),...data.ideias.map(i=>({...i,_tipo:'Ideia',_emoji:'💡'})),...data.notas.map(n=>({...n,_tipo:'Nota',_emoji:'📓'}))].filter(i=>i.tags);
  const allTags=[...new Set(allItems.flatMap(i=>i.tags.split(',').map(t=>t.trim()).filter(Boolean)))].sort();
  const filtered=sel?allItems.filter(i=>i.tags&&i.tags.toLowerCase().includes(sel.toLowerCase())):[];
  return html`
    <div>
      <h1 style=${{fontSize:22,fontWeight:700,margin:'0 0 1.5rem',color:C.text}}>🏷️ Tags Globais</h1>
      ${allTags.length===0&&html`<div style=${{textAlign:'center',color:C.muted,padding:'3rem',fontSize:14}}>Adicione tags em tarefas, projetos ou ideias.</div>`}
      <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:'1.25rem'}}>
        ${allTags.map(tag=>{const count=allItems.filter(i=>i.tags&&i.tags.toLowerCase().includes(tag.toLowerCase())).length;return html`
          <button key=${tag} onClick=${()=>setSel(sel===tag?null:tag)} style=${{...sb,background:sel===tag?C.primary:'var(--cb)',color:sel===tag?'#fff':C.text,border:'1px solid var(--cbr)',padding:'0.3rem 0.85rem',fontSize:12}}>
            #${tag} <span style=${{opacity:0.6,fontSize:11}}>${count}</span>
          </button>`;})}
      </div>
      ${sel&&filtered.map((item,i)=>html`
        <div key=${i} style=${sc}>
          <div style=${{display:'flex',gap:10,alignItems:'center'}}>
            <span style=${{fontSize:18}}>${item._emoji}</span>
            <div><div style=${{fontWeight:600,fontSize:13,color:C.text}}>${item.titulo||item.nome}</div><div style=${{fontSize:11,color:C.muted}}>${item._tipo}</div></div>
          </div>
        </div>`)}
    </div>`;
}

// ── Lixeira ───────────────────────────────────────

      <h1 style=${{fontSize:22,fontWeight:700,margin:'0 0 0.5rem',color:C.text}}>🗑️ Lixeira</h1>
      <p style=${{color:C.muted,fontSize:13,marginBottom:'1.5rem'}}>Itens removidos automaticamente após 30 dias.</p>
      ${validos.length===0&&html`<div style=${{textAlign:'center',color:C.muted,padding:'3rem',fontSize:14}}>Lixeira vazia.</div>`}
      ${validos.map(item=>html`
        <div key=${item.id} style=${{...sc,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style=${{fontWeight:600,fontSize:13,color:C.text}}>${item.dados.titulo||item.dados.nome||'Sem título'}</div>
            <div style=${{fontSize:11,color:C.muted}}>${item._tipo} · ${new Date(item._deletadoEm).toLocaleDateString('pt-BR')}</div>
          </div>
          <div style=${{display:'flex',gap:6}}>
            <button onClick=${()=>onRestaurar(item)} style=${{...sb,background:C.primary+'15',color:C.primary,padding:'0.3rem 0.75rem',fontSize:12}}>↩ Restaurar</button>
            <button onClick=${()=>onDeletar(item.id)} style=${{...sb,background:'#fee2e2',color:C.alta,padding:'0.3rem 0.5rem',fontSize:12}}>🗑</button>
          </div>

}

// ── Log ───────────────────────────────────────────
function LogAtividades({log}){
  const ACOR={criou:C.primary,editou:C.media,concluiu:C.done,deletou:C.alta};
  const tAgo=ts=>{const d=(Date.now()-ts)/1000;if(d<60)return'agora';if(d<3600)return Math.floor(d/60)+'min';if(d<86400)return Math.floor(d/3600)+'h';return new Date(ts).toLocaleDateString('pt-BR');};
  return html`
    <div>
      <h1 style=${{fontSize:22,fontWeight:700,margin:'0 0 1.5rem',color:C.text}}>📝 Log de Atividades</h1>
      ${(log||[]).length===0&&html`<div style=${{textAlign:'center',color:C.muted,padding:'3rem',fontSize:14}}>Nenhuma atividade ainda.</div>`}
      <div style=${{...sc,padding:'0.5rem 1rem'}}>
        ${(log||[]).map((e,i)=>html`

            <span style=${{fontSize:11,color:C.muted,whiteSpace:'nowrap'}}>${tAgo(e.ts)}</span>
          </div>`)}

    </div>`;
}

// ── Sidebar ───────────────────────────────────────
function Sidebar({active,setActive,open,setOpen,counts,exportData,importData,showPomo,setShowPomo,dark,setDark}){
  const items=[{id:'dashboard',icon:'🏠',label:'Dashboard'},{id:'tarefas',icon:'✅',label:'Tarefas'},{id:'projetos',icon:'🗂️',label:'Projetos'},{id:'reunioes',icon:'📅',label:'Reuniões'},{id:'ideias',icon:'💡',label:'Ideias'},{id:'notas',icon:'📓',label:'Notas'},{id:'tabelas',icon:'📊',label:'Tabelas'},{id:'metas',icon:'🎯',label:'Metas'},{id:'calendario',icon:'🗓️',label:'Calendário'},{id:'relatorios',icon:'📈',label:'Relatórios'},{id:'tags',icon:'🏷️',label:'Tags'},{id:'log',icon:'📝',label:'Atividades'},{id:'concursos',icon:'🎯',label:'Concursos'},{id:'lixeira',icon:'🗑️',label:'Lixeira'},{id:'busca',icon:'🔍',label:'Busca'}];
  return html`
    <div style=${{width:open?218:60,minWidth:open?218:60,background:'var(--cs)',display:'flex',flexDirection:'column',padding:'1rem 0.5rem',gap:2,flexShrink:0,transition:'width 0.2s ease',overflow:'hidden'}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:open?'space-between':'center',padding:open?'0 0.5rem 1rem':'0 0 1rem',borderBottom:'1px solid rgba(255,255,255,0.08)',marginBottom:4}}>
        ${open&&html`<span style=${{color:'#fff',fontWeight:700,fontSize:14,whiteSpace:'nowrap'}}>🧠 Workspace</span>`}
        <button onClick=${()=>setOpen(o=>!o)} style=${{...sb,background:'rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.6)',padding:'0.3rem 0.5rem',fontSize:12,borderRadius:7,flexShrink:0}}>
          ${open?'◀':'▶'}
        </button>
      </div>
      ${items.map(i=>{const cnt=counts[i.id]||0;return html`
        <button key=${i.id} onClick=${()=>setActive(i.id)} title=${!open?i.label:undefined}
          style=${{display:'flex',alignItems:'center',gap:open?9:0,justifyContent:open?'flex-start':'center',padding:open?'0.55rem 0.75rem':'0.55rem',borderRadius:8,border:'none',cursor:'pointer',background:active===i.id?'rgba(255,255,255,0.15)':'transparent',color:active===i.id?'#fff':'rgba(255,255,255,0.6)',fontSize:13,fontWeight:active===i.id?600:400,textAlign:'left',width:'100%'}}>
          <span style=${{fontSize:18,flexShrink:0,lineHeight:1}}>${i.icon}</span>
          ${open&&html`<span style=${{whiteSpace:'nowrap',flex:1,fontSize:13,fontWeight:500}}>${i.label}</span>`}
          ${open&&cnt>0&&html`<span style=${{background:'rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.7)',fontSize:10,fontWeight:700,padding:'1px 6px',borderRadius:20}}>${cnt}</span>`}
        </button>`;})}
      <div style=${{flex:1}}/>
      ${[[showPomo?'⏱️':'⏱️','Pomodoro',()=>setShowPomo(p=>!p)],[dark?'☀️':'🌙',dark?'Modo claro':'Modo escuro',()=>setDark(d=>!d)],['💾','Exportar JSON',exportData],['📂','Importar JSON',importData]].map(([icon,label,fn],i)=>html`
        <button key=${i} onClick=${fn} title=${!open?label:undefined} style=${{display:'flex',alignItems:'center',gap:open?9:0,justifyContent:open?'flex-start':'center',padding:open?'0.45rem 0.65rem':'0.45rem',borderRadius:8,border:'none',cursor:'pointer',background:'transparent',color:'rgba(255,255,255,0.6)',fontSize:12,textAlign:'left',width:'100%'}}>
          <span style=${{fontSize:15,flexShrink:0}}>${icon}</span>
          ${open&&html`<span style=${{whiteSpace:'nowrap'}}>${label}</span>`}
        </button>`)}
    </div>`;
}

// ── Dashboard ─────────────────────────────────────
function Dashboard({data,setActive}){
  const {tarefas=[],projetos=[],reunioes=[]}=data;
  const pend=tarefas.filter(t=>t.status!=='concluída'),conc=tarefas.filter(t=>t.status==='concluída'),venc=tarefas.filter(t=>isOverdue(t.prazo)&&t.status!=='concluída'),hj=tarefas.filter(t=>isDueToday(t.prazo)&&t.status!=='concluída');
  const proxR=[...reunioes].filter(r=>r.data>=today()).sort((a,b)=>a.data.localeCompare(b.data));
  const prog=tarefas.length?Math.round(conc.length/tarefas.length*100):0;
  const favs=[...tarefas,...projetos,...data.notas].filter(i=>i._fav);
  const Stat=({l,v,c,onClick})=>html`<div onClick=${onClick} style=${{...sc,flex:1,minWidth:100,cursor:onClick?'pointer':'default',marginBottom:0,borderLeft:'3px solid '+c}}><div style=${{fontSize:26,fontWeight:700,color:c,lineHeight:1}}>${v}</div><div style=${{fontSize:11,color:C.muted,marginTop:4}}>${l}</div></div>`;
  return html`
    <div>
      <h1 style=${{fontSize:22,fontWeight:700,margin:'0 0 3px',color:C.text}}>Bom dia! 👋</h1>
      <p style=${{color:C.muted,marginBottom:'1.25rem',fontSize:13}}>${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
      ${(venc.length>0||hj.length>0)&&html`
        <div style=${{...sc,background:'#fff7ed',borderLeft:'3px solid '+C.alta,cursor:'pointer',padding:'0.75rem 1rem',marginBottom:'0.75rem'}} onClick=${()=>setActive('tarefas')}>
          ${venc.length>0&&html`<div style=${{fontSize:13,color:C.alta,fontWeight:600}}>⚠️ ${venc.length} tarefa${venc.length>1?'s':''} vencida${venc.length>1?'s':''}!</div>`}
          ${hj.length>0&&html`<div style=${{fontSize:13,color:C.media,fontWeight:600}}>📌 ${hj.length} vence${hj.length===1?'':'m'} hoje</div>`}
        </div>`}
      <div style=${{display:'flex',gap:'0.65rem',marginBottom:'0.75rem',flexWrap:'wrap'}}>
        <${Stat} l="Pendentes" v=${pend.length} c=${C.primary} onClick=${()=>setActive('tarefas')}/>
        <${Stat} l="Hoje" v=${hj.length} c=${C.media} onClick=${()=>setActive('tarefas')}/>
        <${Stat} l="Vencidas" v=${venc.length} c=${C.alta} onClick=${()=>setActive('tarefas')}/>
        <${Stat} l="Projetos" v=${projetos.filter(p=>p.status!=='concluído').length} c=${C.doing} onClick=${()=>setActive('projetos')}/>
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'0.65rem',marginBottom:'0.65rem'}}>
        <div style=${sc}>
          <div style=${{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style=${{fontWeight:600,fontSize:13,color:C.text}}>Progresso geral</span><span style=${{color:C.primary,fontWeight:700,fontSize:13}}>${prog}%</span></div>
          <div style=${{height:6,background:'var(--cb)',borderRadius:99}}><div style=${{height:'100%',width:prog+'%',background:C.primary,borderRadius:99}}/></div>
          <div style=${{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:C.muted}}><span>${conc.length} concluídas</span><span>${pend.length} pendentes</span></div>
        </div>
        <div style=${sc}><div style=${{fontWeight:600,fontSize:13,marginBottom:6,color:C.text}}>Reuniões</div><div style=${{fontSize:24,fontWeight:700,color:C.doing}}>${proxR.length}</div><div style=${{fontSize:11,color:C.muted}}>próximas</div></div>
      </div>
      ${favs.length>0&&html`<div style=${sc}><div style=${{fontWeight:600,fontSize:13,marginBottom:'0.65rem',color:C.text}}>⭐ Favoritos</div>${favs.slice(0,5).map(f=>html`<div key=${f.id} style=${{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid var(--cbr)'}}><span style=${{fontSize:13}}>${f.status?'✅':f.etapas?'🗂️':'📓'}</span><span style=${{fontSize:13,color:C.text,flex:1}}>${f.titulo||f.nome}</span>${f.prioridade&&html`<${Badge} label=${f.prioridade} color=${PCOL[f.prioridade]} sm=${true}/>`}</div>`)}</div>`}
      ${pend.length>0&&html`<div style=${sc}><div style=${{fontWeight:600,fontSize:13,marginBottom:'0.65rem',color:C.text}}>📌 Próximas tarefas</div>${pend.slice(0,5).map(t=>html`<div key=${t.id} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid var(--cbr)'}}><div><span style=${{fontSize:13,fontWeight:500,color:C.text}}>${t.titulo}</span>${t.prazo&&html`<span style=${{marginLeft:7,fontSize:11,color:isOverdue(t.prazo)?C.alta:isSoon(t.prazo)?C.media:C.muted}}>${fmt(t.prazo)}${isOverdue(t.prazo)?' ⚠️':''}</span>`}</div><${Badge} label=${t.prioridade} color=${PCOL[t.prioridade]||C.muted} sm=${true}/></div>`)}</div>`}
      ${proxR.length>0&&html`<div style=${sc}><div style=${{fontWeight:600,fontSize:13,marginBottom:'0.65rem',color:C.text}}>📅 Próximas reuniões</div>${proxR.slice(0,3).map(r=>html`<div key=${r.id} style=${{padding:'5px 0',borderBottom:'1px solid var(--cbr)'}}><div style=${{fontWeight:500,fontSize:13,color:C.text}}>${r.titulo}</div><div style=${{fontSize:11,color:C.muted}}>${fmt(r.data)}${r.horario?' · '+r.horario:''}${r.participantes?' · '+r.participantes:''}</div></div>`)}</div>`}
    </div>`;
}

// ── Tarefas ───────────────────────────────────────
function Tarefas({tarefas,updateTarefas,projetos,addLog,softDelete}){
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({titulo:'',prazo:'',prioridade:'média',status:'a fazer',projeto:'',notas:'',tags:'',_recorrencia:'none',_horas:0});
  const [editId,setEditId]=useState(null);const [filtro,setFiltro]=useState('todas');const [view,setView]=useState('lista');
  const [addHId,setAddHId]=useState(null);const [hIn,setHIn]=useState(0);
  const filtered=tarefas.filter(t=>{if(filtro==='todas')return true;if(filtro==='pendentes')return t.status!=='concluída';if(filtro==='hoje')return isDueToday(t.prazo);if(filtro==='vencidas')return isOverdue(t.prazo)&&t.status!=='concluída';if(filtro==='favoritos')return t._fav;return t.status===filtro;});
  const close=()=>{setModal(false);setEditId(null);};
  const save=()=>{if(!form.titulo.trim())return;if(editId){updateTarefas(tarefas.map(t=>t.id===editId?{...t,...form}:t));addLog('editou','tarefa',form.titulo);}else{updateTarefas([...tarefas,{id:uid(),...form,criadaEm:today()}]);addLog('criou','tarefa',form.titulo);}close();};
  const del=t=>{softDelete(t,'tarefa');updateTarefas(tarefas.filter(x=>x.id!==t.id));addLog('deletou','tarefa',t.titulo);};
  const toggle=t=>{const next=t.status==='a fazer'?'em andamento':t.status==='em andamento'?'concluída':'a fazer';updateTarefas(tarefas.map(x=>x.id===t.id?{...x,status:next}:x));if(next==='concluída')addLog('concluiu','tarefa',t.titulo);};
  const toggleFav=t=>updateTarefas(tarefas.map(x=>x.id===t.id?{...x,_fav:!x._fav}:x));
  const addH=id=>{updateTarefas(tarefas.map(t=>t.id===id?{...t,_horas:(t._horas||0)+Number(hIn)}:t));setAddHId(null);setHIn(0);};
  return html`
    <div>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
        <h1 style=${{fontSize:22,fontWeight:700,margin:0,color:C.text}}>✅ Tarefas</h1>
        <div style=${{display:'flex',gap:7}}>
          <div style=${{display:'flex',border:'1px solid var(--cbr)',borderRadius:8,overflow:'hidden'}}>
            ${[['lista','☰ Lista'],['kanban','⊞ Kanban']].map(([k,v])=>html`<button key=${k} onClick=${()=>setView(k)} style=${{...sb,background:view===k?C.primary:'transparent',color:view===k?'#fff':C.muted,padding:'0.35rem 0.65rem',fontSize:12,borderRadius:0,fontWeight:400}}>${v}</button>`)}
          </div>
          <button onClick=${()=>{setForm({titulo:'',prazo:'',prioridade:'média',status:'a fazer',projeto:'',notas:'',tags:'',_recorrencia:'none',_horas:0});setEditId(null);setModal(true);}} style=${{...sb,background:C.primary,color:'#fff'}}>+ Nova</button>
        </div>
      </div>
      ${view==='kanban'&&html`<${Kanban} tarefas=${tarefas} updateTarefas=${updateTarefas}/>`}
      ${view==='lista'&&html`<div>
        <div style=${{display:'flex',gap:5,marginBottom:'0.85rem',flexWrap:'wrap'}}>
          ${['todas','pendentes','hoje','vencidas','favoritos','a fazer','em andamento','concluída'].map(f=>html`<button key=${f} onClick=${()=>setFiltro(f)} style=${{...sb,background:filtro===f?C.primary:'transparent',color:filtro===f?'#fff':C.muted,border:'1px solid var(--cbr)',padding:'0.25rem 0.7rem',fontSize:12,fontWeight:400}}>${f}</button>`)}
        </div>
        ${filtered.length===0&&html`<div style=${{textAlign:'center',color:C.muted,padding:'3rem',fontSize:14}}>Nenhuma tarefa aqui.</div>`}
        ${filtered.map(t=>html`
          <div key=${t.id} style=${{...sc,borderLeft:'3px solid '+(SCOL[t.status]||C.muted)}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style=${{flex:1}}>
                <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                  <button onClick=${()=>toggle(t)} style=${{width:18,height:18,borderRadius:'50%',border:'2px solid '+SCOL[t.status],background:t.status==='concluída'?SCOL[t.status]:'transparent',cursor:'pointer',flexShrink:0}}/>
                  <span style=${{fontWeight:600,fontSize:14,textDecoration:t.status==='concluída'?'line-through':'none',color:t.status==='concluída'?C.muted:C.text}}>${t.titulo}</span>
                  ${t._recorrencia&&t._recorrencia!=='none'&&html`<span style=${{fontSize:10,color:C.primary,background:C.primary+'15',padding:'1px 6px',borderRadius:10}}>🔄 ${t._recorrencia}</span>`}
                </div>
                <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginLeft:26}}>
                  <${Badge} label=${t.status} color=${SCOL[t.status]||C.muted} sm=${true}/>
                  <${Badge} label=${t.prioridade} color=${PCOL[t.prioridade]||C.muted} sm=${true}/>
                  ${t.prazo&&html`<span style=${{fontSize:11,color:isOverdue(t.prazo)&&t.status!=='concluída'?C.alta:C.muted}}>📅 ${fmt(t.prazo)}${isOverdue(t.prazo)&&t.status!=='concluída'?' ⚠️':''}</span>`}
                  ${t.projeto&&html`<span style=${{fontSize:11,color:C.muted}}>📁 ${t.projeto}</span>`}
                  ${(t._horas||0)>0&&html`<span style=${{fontSize:11,color:C.muted}}>⏰ ${t._horas}h</span>`}
                </div>
                ${t.notas&&html`<p style=${{fontSize:12,color:C.muted,marginLeft:26,marginTop:4}}>${t.notas}</p>`}
              </div>
              <div style=${{display:'flex',gap:4,alignItems:'center',flexShrink:0,marginLeft:8}}>
                <button onClick=${()=>toggleFav(t)} style=${{...sb,background:'transparent',color:t._fav?'#f59e0b':C.muted,padding:'0.15rem 0.4rem',fontSize:14}}>${t._fav?'⭐':'☆'}</button>
                <button onClick=${()=>{setAddHId(t.id);setHIn(0);}} style=${{...sb,background:'transparent',color:C.muted,padding:'0.15rem 0.4rem',fontSize:11}}>⏰</button>
                <button onClick=${()=>{setForm({titulo:t.titulo,prazo:t.prazo||'',prioridade:t.prioridade,status:t.status,projeto:t.projeto||'',notas:t.notas||'',tags:t.tags||'',_recorrencia:t._recorrencia||'none',_horas:t._horas||0});setEditId(t.id);setModal(true);}} style=${{...sb,background:'transparent',border:'1px solid var(--cbr)',color:C.muted,padding:'0.15rem 0.4rem',fontSize:11}}>✏️</button>
                <button onClick=${()=>del(t)} style=${{...sb,background:'transparent',color:C.alta,padding:'0.15rem 0.4rem',fontSize:11}}>🗑</button>
              </div>
            </div>
            ${addHId===t.id&&html`<div style=${{display:'flex',gap:7,alignItems:'center',marginTop:8,marginLeft:26,padding:'0.5rem',background:'var(--cb)',borderRadius:8}}>
              <span style=${{fontSize:12,color:C.muted}}>⏰ Horas:</span>
              <input type="number" min="0" step="0.5" style=${{...si,width:70,padding:'0.25rem 0.5rem'}} value=${hIn} onChange=${e=>setHIn(e.target.value)}/>
              <button onClick=${()=>addH(t.id)} style=${{...sb,background:C.primary,color:'#fff',padding:'0.25rem 0.65rem',fontSize:12}}>+ Adicionar</button>
              <button onClick=${()=>setAddHId(null)} style=${{...sb,background:'transparent',color:C.muted,padding:'0.25rem 0.5rem',fontSize:12}}>Cancelar</button>
            </div>`}
          </div>`)}
      </div>`}
      ${modal&&html`<${Modal} title=${editId?'Editar tarefa':'Nova tarefa'} onClose=${close}>
        <div style=${{display:'flex',flexDirection:'column',gap:12}}>
          <div><label style=${sl}>Título *</label><input style=${si} value=${form.titulo} onChange=${e=>setForm(p=>({...p,titulo:e.target.value}))} placeholder="O que precisa ser feito?"/></div>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style=${sl}>Prazo</label><input type="date" style=${si} value=${form.prazo} onChange=${e=>setForm(p=>({...p,prazo:e.target.value}))}/></div>
            <div><label style=${sl}>Prioridade</label><select style=${si} value=${form.prioridade} onChange=${e=>setForm(p=>({...p,prioridade:e.target.value}))}><option>alta</option><option>média</option><option>baixa</option></select></div>
            <div><label style=${sl}>Status</label><select style=${si} value=${form.status} onChange=${e=>setForm(p=>({...p,status:e.target.value}))}><option>a fazer</option><option>em andamento</option><option>concluída</option></select></div>
            <div><label style=${sl}>Projeto</label><select style=${si} value=${form.projeto} onChange=${e=>setForm(p=>({...p,projeto:e.target.value}))}><option value="">-</option>${projetos.map(p=>html`<option key=${p.id} value=${p.titulo}>${p.titulo}</option>`)}</select></div>
            <div><label style=${sl}>Recorrência</label><select style=${si} value=${form._recorrencia} onChange=${e=>setForm(p=>({...p,_recorrencia:e.target.value}))}><option value="none">Nenhuma</option><option value="diária">Diária</option><option value="semanal">Semanal</option><option value="mensal">Mensal</option></select></div>
            <div><label style=${sl}>Tags</label><input style=${si} value=${form.tags} onChange=${e=>setForm(p=>({...p,tags:e.target.value}))} placeholder="ex: urgente"/></div>
          </div>
          <div><label style=${sl}>Notas</label><textarea style=${{...si,minHeight:70,resize:'vertical'}} value=${form.notas} onChange=${e=>setForm(p=>({...p,notas:e.target.value}))}/></div>
          <div style=${{display:'flex',gap:7,justifyContent:'flex-end'}}>
            <button onClick=${close} style=${{...sb,background:'transparent',border:'1px solid var(--cbr)',color:C.muted,fontWeight:400}}>Cancelar</button>
            <button onClick=${save} style=${{...sb,background:C.primary,color:'#fff'}}>Salvar</button>
          </div>
        </div>
      </>`}
    </div>`;
}

// ── Projetos ──────────────────────────────────────
function Projetos({projetos,updateProjetos,tarefas,addLog,softDelete}){
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({titulo:'',descricao:'',objetivo:'',status:'em andamento',prazo:'',cor:C.primary,tags:''});
  const [editId,setEditId]=useState(null);const [exp,setExp]=useState(null);const [tabs,setTabs]=useState({});
  const close=()=>{setModal(false);setEditId(null);};
  const save=()=>{if(!form.titulo.trim())return;if(editId){updateProjetos(projetos.map(p=>p.id===editId?{...p,...form}:p));addLog('editou','projeto',form.titulo);}else{updateProjetos([...projetos,{id:uid(),...form,etapas:[],criadoEm:today()}]);addLog('criou','projeto',form.titulo);}close();};
  const del=p=>{softDelete(p,'projeto');updateProjetos(projetos.filter(x=>x.id!==p.id));};
  const toggleFav=p=>updateProjetos(projetos.map(x=>x.id===p.id?{...x,_fav:!x._fav}:x));
  return html`
    <div>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
        <h1 style=${{fontSize:22,fontWeight:700,margin:0,color:C.text}}>🗂️ Projetos</h1>
        <button onClick=${()=>{setForm({titulo:'',descricao:'',objetivo:'',status:'em andamento',prazo:'',cor:C.primary,tags:''});setEditId(null);setModal(true);}} style=${{...sb,background:C.primary,color:'#fff'}}>+ Novo</button>
      </div>
      ${projetos.length===0&&html`<div style=${{textAlign:'center',color:C.muted,padding:'3rem',fontSize:14}}>Nenhum projeto ainda.</div>`}
      ${projetos.map(p=>{
        const cor=p.cor||C.primary,tP=tarefas.filter(t=>t.projeto===p.titulo),done=tP.filter(t=>t.status==='concluída').length,prog=tP.length?Math.round(done/tP.length*100):0,isE=exp===p.id,tab=tabs[p.id]||'tarefas';
        return html`<div key=${p.id} style=${{...sc,borderLeft:'3px solid '+cor}}>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style=${{flex:1,cursor:'pointer'}} onClick=${()=>setExp(isE?null:p.id)}>
              <div style=${{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                <div style=${{width:10,height:10,borderRadius:'50%',background:cor,flexShrink:0}}/>
                <span style=${{fontWeight:700,fontSize:15,color:C.text}}>${p.titulo}</span>
                <${Badge} label=${p.status} color=${SPRC[p.status]||cor} sm=${true}/>
                ${p.prazo&&html`<span style=${{fontSize:11,color:C.muted}}>📅 ${fmt(p.prazo)}</span>`}
                <span style=${{fontSize:12,color:C.muted,marginLeft:'auto'}}>${isE?'▲':'▼'}</span>
              </div>
              ${p.descricao&&html`<p style=${{fontSize:12,color:C.muted,marginTop:4}}>${p.descricao}</p>`}
            </div>

  const nota=notas.find(n=>n.id===sel);
  const criar=()=>{if(!newT.trim())return;const blocks=tmpl&&TMPLS[tmpl]?TMPLS[tmpl]():[newBlock('paragraph')];const n={id:uid(),titulo:newT.trim(),blocks,atualizadaEm:today()};updateNotas([n,...notas]);setSel(n.id);setNewT('');setTmpl('');addLog('criou','nota',newT.trim());};
  const upd=(k,v)=>updateNotas(notas.map(n=>n.id===sel?{...n,[k]:v,atualizadaEm:today()}:n));
  const del=n=>{updateNotas(notas.filter(x=>x.id!==n.id));if(sel===n.id)setSel(null);};
  const toggleFav=n=>updateNotas(notas.map(x=>x.id===n.id?{...x,_fav:!x._fav}:x));
  return html`
    <div>
      <h1 style=${{fontSize:22,fontWeight:700,margin:'0 0 1.25rem',color:C.text}}>📓 Notas & Documentos</h1>

          <div style=${{display:'flex',gap:5,marginBottom:7}}>

            <button onClick=${criar} style=${{...sb,background:C.primary,color:'#fff',padding:'0.4rem 0.65rem',flexShrink:0,fontSize:13}}>+</button>

          </select>
          ${notas.map(n=>html`
            <div key=${n.id} onClick=${()=>setSel(n.id)} style=${{padding:'0.45rem 0.55rem',borderRadius:7,cursor:'pointer',background:sel===n.id?C.primary+'12':'transparent',borderLeft:sel===n.id?'3px solid '+C.primary:'3px solid transparent',marginBottom:2,display:'flex',justifyContent:'space-between',alignItems:'center',gap:5}}>
              <div style=${{minWidth:0}}>
                <div style=${{fontSize:12,fontWeight:sel===n.id?600:400,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${n._fav?'⭐ ':''}${n.titulo}</div>
                <div style=${{fontSize:10,color:C.muted}}>${n.atualizadaEm&&fmt(n.atualizadaEm)}</div>
              </div>
              <button onClick=${ev=>{ev.stopPropagation();del(n);}} style=${{...sb,background:'transparent',color:C.muted,padding:'0.1rem',fontSize:11,opacity:0.5,flexShrink:0}}>✕</button>
            </div>`)}
          ${notas.length===0&&html`<p style=${{fontSize:12,color:C.muted,textAlign:'center',marginTop:'0.85rem'}}>Nenhuma nota</p>`}
        </div>
        <div style=${{...sc,overflowY:'auto'}}>
          ${nota&&html`

              <button onClick=${()=>toggleFav(nota)} style=${{...sb,background:'transparent',color:nota._fav?'#f59e0b':C.muted,padding:'0.25rem 0.5rem',fontSize:15}}>${nota._fav?'⭐':'☆'}</button>

function Tabelas({tabelas,updateTabelas}){
  const [sel,setSel]=useState(null);const [newT,setNewT]=useState('');
  const tab=tabelas.find(t=>t.id===sel);
  const criar=()=>{if(!newT.trim())return;const t={id:uid(),titulo:newT.trim(),headers:['Coluna 1','Coluna 2','Coluna 3'],rows:[['','',''],['','','']]};updateTabelas([t,...tabelas]);setSel(t.id);setNewT('');};
  const del=id=>{updateTabelas(tabelas.filter(t=>t.id!==id));if(sel===id)setSel(null);};
  const upd=u=>updateTabelas(tabelas.map(t=>t.id===sel?{...t,...u}:t));
  const uC=(ri,ci,v)=>upd({rows:tab.rows.map((r,i)=>i===ri?r.map((c,j)=>j===ci?v:c):r)});
  const uH=(ci,v)=>upd({headers:tab.headers.map((h,i)=>i===ci?v:h)});
  return html`
    <div>
      <h1 style=${{fontSize:22,fontWeight:700,margin:'0 0 1.25rem',color:C.text}}>📊 Tabelas</h1>
      <div style=${{display:'grid',gridTemplateColumns:'210px 1fr',gap:'0.75rem',minHeight:480}}>
        <div style=${{...sc,padding:'0.85rem'}}>
          <div style=${{display:'flex',gap:5,marginBottom:'0.85rem'}}>
            <input style=${{...si,fontSize:12}} value=${newT} onChange=${e=>setNewT(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&criar()} placeholder="Nova tabela..."/>
            <button onClick=${criar} style=${{...sb,background:C.primary,color:'#fff',padding:'0.4rem 0.65rem',flexShrink:0,fontSize:13}}>+</button>
          </div>
          ${tabelas.map(t=>html`
            <div key=${t.id} onClick=${()=>setSel(t.id)} style=${{padding:'0.45rem 0.55rem',borderRadius:7,cursor:'pointer',background:sel===t.id?C.primary+'12':'transparent',borderLeft:sel===t.id?'3px solid '+C.primary:'3px solid transparent',marginBottom:2,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><div style=${{fontSize:12,fontWeight:sel===t.id?600:400,color:C.text}}>${t.titulo}</div><div style=${{fontSize:10,color:C.muted}}>${t.headers.length} col · ${t.rows.length} lin</div></div>
              <button onClick=${ev=>{ev.stopPropagation();del(t.id);}} style=${{...sb,background:'transparent',color:C.muted,padding:'0.1rem',fontSize:11,opacity:0.5}}>✕</button>
            </div>`)}
          ${tabelas.length===0&&html`<p style=${{fontSize:12,color:C.muted,textAlign:'center',marginTop:'0.85rem'}}>Nenhuma tabela</p>`}
        </div>
        <div style=${sc}>
          ${tab&&html`
            <input style=${{...si,fontSize:17,fontWeight:700,border:'none',padding:'0 0 0.6rem',borderBottom:'1px solid var(--cbr)',marginBottom:'0.85rem'}} value=${tab.titulo} onChange=${e=>upd({titulo:e.target.value})}/>
            <${TGrid} headers=${tab.headers} rows=${tab.rows} onUH=${uH} onUC=${uC}
              onAR=${()=>upd({rows:[...tab.rows,tab.headers.map(()=>'')]})}
              onAC=${()=>upd({headers:[...tab.headers,'Nova col'],rows:tab.rows.map(r=>[...r,''])})}
              onDR=${ri=>upd({rows:tab.rows.filter((_,i)=>i!==ri)})}
              onDC=${ci=>upd({headers:tab.headers.filter((_,i)=>i!==ci),rows:tab.rows.map(r=>r.filter((_,i)=>i!==ci))})}/>
            <p style=${{fontSize:11,color:C.muted,marginTop:'0.85rem'}}>💡 Referencie em Notas com o bloco <strong>🔗 Ref. Tabela</strong></p>`}

// ── Metas ─────────────────────────────────────────
function Metas({metas,updateMetas,addLog}){
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({titulo:'',descricao:'',prazo:'',progresso:0});
  const [editId,setEditId]=useState(null);
  const close=()=>{setModal(false);setEditId(null);};
  const save=()=>{if(!form.titulo.trim())return;if(editId){updateMetas(metas.map(m=>m.id===editId?{...m,...form}:m));addLog('editou','meta',form.titulo);}else{updateMetas([...metas,{id:uid(),...form,criadaEm:today()}]);addLog('criou','meta',form.titulo);}close();};
  const pC=p=>p>=100?C.done:p>=60?C.primary:p>=30?C.media:C.alta;
  return html`
    <div>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
        <h1 style=${{fontSize:22,fontWeight:700,margin:0,color:C.text}}>🎯 Metas & OKRs</h1>
        <button onClick=${()=>{setForm({titulo:'',descricao:'',prazo:'',progresso:0});setEditId(null);setModal(true);}} style=${{...sb,background:C.primary,color:'#fff'}}>+ Nova</button>
      </div>
      ${metas.length===0&&html`<div style=${{textAlign:'center',color:C.muted,padding:'3rem',fontSize:14}}>Defina sua primeira meta!</div>`}
      ${metas.map(m=>{const p=Number(m.progresso)||0;return html`
        <div key=${m.id} style=${sc}>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style=${{flex:1}}>
              <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                <span style=${{fontWeight:700,fontSize:15,color:C.text}}>${m.titulo}</span>
                ${p>=100&&html`<${Badge} label="Concluída" color=${C.done} sm=${true}/>`}
                ${m.prazo&&html`<span style=${{fontSize:11,color:isOverdue(m.prazo)&&p<100?C.alta:C.muted}}>📅 ${fmt(m.prazo)}</span>`}
              </div>
              ${m.descricao&&html`<p style=${{fontSize:12,color:C.muted,marginBottom:8}}>${m.descricao}</p>`}
              <div style=${{display:'flex',alignItems:'center',gap:10}}>
                <div style=${{flex:1,height:7,background:'var(--cb)',borderRadius:99}}><div style=${{height:'100%',width:Math.min(p,100)+'%',background:pC(p),borderRadius:99}}/></div>
                <span style=${{fontWeight:700,color:pC(p),minWidth:32,fontSize:13}}>${p}%</span>
              </div>
              <input type="range" min="0" max="100" value=${p} onChange=${e=>updateMetas(metas.map(x=>x.id===m.id?{...x,progresso:Number(e.target.value)}:x))} style=${{width:'100%',marginTop:6,accentColor:pC(p)}}/>
            </div>
            <div style=${{display:'flex',gap:4,marginLeft:10}}>
              <button onClick=${()=>{setForm({titulo:m.titulo,descricao:m.descricao||'',prazo:m.prazo||'',progresso:m.progresso||0});setEditId(m.id);setModal(true);}} style=${{...sb,background:'transparent',border:'1px solid var(--cbr)',color:C.muted,padding:'0.15rem 0.4rem',fontSize:11}}>✏️</button>
              <button onClick=${()=>updateMetas(metas.filter(x=>x.id!==m.id))} style=${{...sb,background:'transparent',color:C.alta,padding:'0.15rem 0.4rem',fontSize:11}}>🗑</button>
            </div>
          </div>
        </div>`;})}
      ${modal&&html`<${Modal} title=${editId?'Editar meta':'Nova meta'} onClose=${close}>
        <div style=${{display:'flex',flexDirection:'column',gap:12}}>
          <div><label style=${sl}>Título *</label><input style=${si} value=${form.titulo} onChange=${e=>setForm(p=>({...p,titulo:e.target.value}))}/></div>
          <div><label style=${sl}>Descrição / KR</label><textarea style=${{...si,minHeight:70,resize:'vertical'}} value=${form.descricao} onChange=${e=>setForm(p=>({...p,descricao:e.target.value}))}/></div>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style=${sl}>Prazo</label><input type="date" style=${si} value=${form.prazo} onChange=${e=>setForm(p=>({...p,prazo:e.target.value}))}/></div>
            <div><label style=${sl}>Progresso (%)</label><input type="number" min="0" max="100" style=${si} value=${form.progresso} onChange=${e=>setForm(p=>({...p,progresso:Number(e.target.value)}))}/></div>
          </div>
          <div style=${{display:'flex',gap:7,justifyContent:'flex-end'}}>
            <button onClick=${close} style=${{...sb,background:'transparent',border:'1px solid var(--cbr)',color:C.muted,fontWeight:400}}>Cancelar</button>
            <button onClick=${save} style=${{...sb,background:C.primary,color:'#fff'}}>Salvar</button>
          </div>
        </div>
      </>`}
    </div>`;
}

// ── Busca ─────────────────────────────────────────
function Busca({data}){
  const [q,setQ]=useState('');const sq=q.trim().toLowerCase();const results=[];
  if(sq.length>1){
    const chk=(items,tipo,emoji,sub)=>items.forEach(i=>{if((i.titulo||'').toLowerCase().includes(sq)||(i.notas||i.descricao||i.conteudo||'').toLowerCase().includes(sq))results.push({tipo,emoji,titulo:i.titulo||i.nome||'',sub:sub(i)});});
    chk(data.tarefas,'Tarefa','✅',t=>t.status);chk(data.projetos,'Projeto','🗂️',p=>p.status);chk(data.reunioes,'Reunião','📅',r=>r.data?fmt(r.data):'');chk(data.ideias,'Ideia','💡',i=>i.tags||'');chk(data.notas,'Nota','📓',n=>n.atualizadaEm?fmt(n.atualizadaEm):'');chk(data.metas,'Meta','🎯',m=>m.progresso+'%');
    data.tabelas.forEach(t=>{if(t.titulo.toLowerCase().includes(sq))results.push({tipo:'Tabela',emoji:'📊',titulo:t.titulo,sub:t.headers.length+' col'});});
  }
  return html`
    <div>
      <h1 style=${{fontSize:22,fontWeight:700,margin:'0 0 1.25rem',color:C.text}}>🔍 Busca Global</h1>
      <input style=${{...si,fontSize:15,padding:'0.65rem 0.9rem',marginBottom:'1.25rem'}} value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar em todo o workspace..."/>
      ${sq.length>1&&results.length===0&&html`<div style=${{textAlign:'center',color:C.muted,padding:'2rem',fontSize:13}}>Nenhum resultado para "${q}"</div>`}
      ${results.map((r,i)=>html`<div key=${i} style=${sc}><div style=${{display:'flex',gap:10,alignItems:'center'}}><span style=${{fontSize:20}}>${r.emoji}</span><div><div style=${{fontWeight:600,fontSize:13,color:C.text}}>${r.titulo}</div><div style=${{fontSize:11,color:C.muted}}>${r.tipo}${r.sub?' · '+r.sub:''}</div></div></div></div>`)}
      ${sq.length<=1&&html`<div style=${{textAlign:'center',color:C.muted,padding:'3rem',fontSize:13}}>Digite algo para buscar</div>`}
    </div>`;
}

            <div key=${x.data} style=${{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              <span style=${{fontSize:10,fontWeight:600,color:x.horas>=(dados.horasMeta||6)?'#10b981':'#f59e0b'}}>${x.horas}h</span>
              <div style=${{width:'100%',background:x.horas>=(dados.horasMeta||6)?'#10b981':'#6366f1',borderRadius:'3px 3px 0 0',height:`${Math.max(6,x.horas/(dados.horasMeta||6)*80)}px`}}></div>
              <span style=${{fontSize:9,color:C.muted}}>${x.data.slice(0,5)}</span>
            </div>`)}
        </div>
      </div>`}
    </div>`;
  }

  const tabs=[{id:'materias',label:'📚 Matérias'},{id:'questoes',label:'✏️ Questões'},{id:'simulados',label:'📊 Simulados'},{id:'edital',label:'📋 Edital'},{id:'horas',label:'⏰ Horas'}];

  return html`<div>
    <h1 style=${{fontSize:22,fontWeight:700,marginBottom:'1.25rem'}}>🎯 Concursos</h1>
    <div style=${{display:'flex',gap:6,marginBottom:'1.25rem',flexWrap:'wrap'}}>
      ${tabs.map(t=>html`<button key=${t.id} onClick=${()=>setTab(t.id)}
        style=${{...sb,background:tab===t.id?C.primary:'var(--cc)',color:tab===t.id?'#fff':C.muted,border:`1px solid ${tab===t.id?C.primary:'var(--cbr)'}`,fontSize:13}}>
        ${t.label}
      </button>`)}
    </div>
    ${tab==='materias'&&html`<${MateriasTab}/>`}
    ${tab==='questoes'&&html`<${QuestoesTab}/>`}
    ${tab==='simulados'&&html`<${SimuladosTab}/>`}
    ${tab==='edital'&&html`<${EditalTab}/>`}
    ${tab==='horas'&&html`<${HorasTab}/>`}
  </div>`;
}

function App(){
  const [active,setActive]=useState('dashboard');
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [showPomo,setShowPomo]=useState(false);
  const [dark,setDark]=useState(false);
  const EMPTY={tarefas:[],projetos:[],reunioes:[],ideias:[],notas:[],metas:[],tabelas:[],concursos:{materias:[],questoes:[],simulados:[],edital:[],horasMeta:6,horasHoje:0,horasLog:[]},lixeira:[],log:[]};
  const [data,setData]=useState(EMPTY);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{applyTheme(dark);},[dark]);

  useEffect(()=>{
    const ref=fdb.ref('workspace');
    ref.on('value',snap=>{
      const val=snap.val();
      if(val){
        // converter objetos em arrays
        const merged={...EMPTY};
        Object.keys(EMPTY).forEach(k=>{
          const v=val[k];
          if(!v)merged[k]=[];
          else if(Array.isArray(v))merged[k]=v;
          else merged[k]=Object.values(v).filter(Boolean);
        });
        // migrar notas
        merged.notas=merged.notas.map(n=>n&&n.blocks?n:{...n,blocks:[{id:uid(),type:'paragraph',content:(n&&n.conteudo)||''}]});
        // migrar projetos
        merged.projetos=merged.projetos.map(p=>p?{...p,etapas:p.etapas?toArr(p.etapas):[]}:{});
        setData(merged);
      }
      setLoaded(true);
    });
    return()=>ref.off();
  },[]);

  const save=useCallback(d=>{fdb.ref('workspace').set(d);},[]);
  const upd=(key,val)=>{const d={...data,[key]:val};setData(d);save(d);};
  const addLog=(acao,tipo,titulo)=>{const d={...data,log:[logEntry(acao,tipo,titulo),...(data.log||[])].slice(0,100)};setData(d);save(d);};
  const softDelete=(item,tipo)=>{const entry={id:uid(),_tipo:tipo,_deletadoEm:Date.now(),dados:item};const d={...data,lixeira:[entry,...(data.lixeira||[])].slice(0,200)};setData(d);save(d);};
  const restaurar=item=>{const km={tarefa:'tarefas',projeto:'projetos','reunião':'reunioes',ideia:'ideias',nota:'notas',meta:'metas'};const key=km[item._tipo]||'tarefas';const d={...data,[key]:[...(data[key]||[]),item.dados],lixeira:(data.lixeira||[]).filter(x=>x.id!==item.id)};setData(d);save(d);};
  const delPerm=id=>{const d={...data,lixeira:(data.lixeira||[]).filter(x=>x.id!==id)};setData(d);save(d);};

  const exportJSON=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='workspace-'+today()+'.json';a.click();URL.revokeObjectURL(url);};
  const importJSON=()=>{const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const p=JSON.parse(ev.target.result);const m={tarefas:[...(data.tarefas||[]),...toArr(p.tarefas)],projetos:[...(data.projetos||[]),...toArr(p.projetos)],reunioes:[...(data.reunioes||[]),...toArr(p.reunioes)],ideias:[...(data.ideias||[]),...toArr(p.ideias)],notas:[...(data.notas||[]),...toArr(p.notas)],metas:[...(data.metas||[]),...toArr(p.metas)],tabelas:[...(data.tabelas||[]),...toArr(p.tabelas)],lixeira:data.lixeira||[],log:data.log||[]};setData(m);save(m);alert('Dados importados!');}catch{alert('Arquivo inválido.');}};reader.readAsText(file);};input.click();};

  const counts={tarefas:data.tarefas.filter(t=>t.status!=='concluída').length,reunioes:data.reunioes.filter(r=>r.data>=today()).length,metas:data.metas.filter(m=>(m.progresso||0)<100).length,lixeira:(data.lixeira||[]).length,log:(data.log||[]).length};

  if(!loaded)return html`
    <div style=${{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#9ca3af',flexDirection:'column',gap:10,background:'#f9fafb'}}>
      <div style=${{fontSize:40}}>🧠</div>
      <div style=${{fontSize:15}}>Carregando...</div>
      <div style=${{fontSize:12,color:'#ccc'}}>Aguarde um momento...</div>
    </div>`;

  return html`
    <div style=${{display:'flex',height:'100vh',background:'var(--cb,#f9fafb)',overflow:'hidden'}}>
      <${Sidebar} active=${active} setActive=${setActive} open=${sidebarOpen} setOpen=${setSidebarOpen} counts=${counts} exportData=${exportJSON} importData=${importJSON} showPomo=${showPomo} setShowPomo=${setShowPomo} dark=${dark} setDark=${setDark}/>
      <main style=${{flex:1,overflowY:'auto',padding:'1.75rem 2rem'}}>
        ${active==='dashboard'&&html`<${Dashboard} data=${data} setActive=${setActive}/>`}
        ${active==='concursos'&&html`<${Concursos} concursos=${data.concursos} updateConcursos=${v=>save({...data,concursos:v})} addLog=${addLog}/>`}
        ${active==='tarefas'&&html`<${Tarefas} tarefas=${data.tarefas} updateTarefas=${v=>upd('tarefas',v)} projetos=${data.projetos} addLog=${addLog} softDelete=${softDelete}/>`}
        ${active==='projetos'&&html`<${Projetos} projetos=${data.projetos} updateProjetos=${v=>upd('projetos',v)} tarefas=${data.tarefas} addLog=${addLog} softDelete=${softDelete}/>`}
        ${active==='reunioes'&&html`<${Reunioes} reunioes=${data.reunioes} updateReunioes=${v=>upd('reunioes',v)} addLog=${addLog}/>`}
        ${active==='ideias'&&html`<${Ideias} ideias=${data.ideias} updateIdeias=${v=>upd('ideias',v)} addLog=${addLog}/>`}
        ${active==='notas'&&html`<${Notas} notas=${data.notas} updateNotas=${v=>upd('notas',v)} tabelas=${data.tabelas} addLog=${addLog}/>`}
        ${active==='tabelas'&&html`<${Tabelas} tabelas=${data.tabelas} updateTabelas=${v=>upd('tabelas',v)}/>`}
        ${active==='metas'&&html`<${Metas} metas=${data.metas} updateMetas=${v=>upd('metas',v)} addLog=${addLog}/>`}
        ${active==='calendario'&&html`<${Calendario} tarefas=${data.tarefas} reunioes=${data.reunioes}/>`}
        ${active==='relatorios'&&html`<${Relatorios} tarefas=${data.tarefas} projetos=${data.projetos} log=${data.log}/>`}
        ${active==='tags'&&html`<${Tags} data=${data}/>`}
        ${active==='log'&&html`<${LogAtividades} log=${data.log}/>`}
        ${active==='lixeira'&&html`<${Lixeira} lixeira=${data.lixeira||[]} onRestaurar=${restaurar} onDeletar=${delPerm}/>`}
        ${active==='busca'&&html`<${Busca} data=${data}/>`}
      </main>
      ${showPomo&&html`<${Pomodoro} onClose=${()=>setShowPomo(false)}/>`}
    </div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
